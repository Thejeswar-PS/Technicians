<ng-container *ngIf="menuItems.length">
  <ng-container *ngFor="let item of menuItems">
    <div class="menu-item menu-lg-down-accordion me-lg-1" [class.menu-dropdown]="item.children?.length"
      data-kt-menu-trigger="{default: 'click', lg: 'hover'}" data-kt-menu-placement="bottom-start">
      <ng-container *ngIf="item.children?.length; else simpleItem">
        <span class="menu-link menu-link-hover py-3">
          <span class="menu-title fs-2 fw-bold text-dark">{{ item.name }}</span>
          <span class="menu-arrow d-lg-none"></span>
        </span>
        <div class="menu-sub menu-sub-lg-down-accordion menu-sub-lg-dropdown menu-rounded-0 py-lg-4 w-lg-225px"
          data-kt-menu-dismiss="true" data-popper-placement="bottom-start">
          <div class="menu-item menu-lg-down-accordion me-lg-1" *ngFor="let child of item.children" data-kt-menu-placement="right-start">
            <ng-container *ngIf="child.children?.length; else childLeaf">
              <span class="menu-link py-3">
                <span class="menu-icon"><i class="bi fs-3 bi-folder"></i></span>
                <span class="menu-title fs-4 text-dark">{{ child.name }}</span>
                <span class="menu-arrow"></span>
              </span>
              <div class="menu-sub menu-sub-lg-down-accordion menu-sub-lg-dropdown menu-rounded-0 py-lg-4 w-lg-225px"
                data-kt-menu-dismiss="true">
                <div class="menu-item me-lg-1" *ngFor="let sub of child.children">
                  <ng-container *ngIf="isRouterLink(sub.url); else subHref">
                    <a class="menu-link py-3" [routerLink]="sub.url">
                      <span class="menu-title">{{ sub.name }}</span>
                    </a>
                  </ng-container>
                  <ng-template #subHref>
                    <a class="menu-link py-3" [href]="getSafeUrl(sub.url)" [target]="isExternalLink(sub.url) ? '_blank' : '_self'" [rel]="isExternalLink(sub.url) ? 'noopener' : null">
                      <span class="menu-title">{{ sub.name }}</span>
                    </a>
                  </ng-template>
                </div>
              </div>
            </ng-container>
            <ng-template #childLeaf>
              <ng-container *ngIf="isRouterLink(child.url); else childHref">
                <a class="menu-link py-3" [routerLink]="child.url">
                  <span class="menu-icon"><i class="bi fs-3 bi-layers"></i></span>
                  <span class="menu-title fs-4 text-dark">{{ child.name }}</span>
                </a>
              </ng-container>
              <ng-template #childHref>
                <a class="menu-link py-3" [href]="getSafeUrl(child.url)" [target]="isExternalLink(child.url) ? '_blank' : '_self'" [rel]="isExternalLink(child.url) ? 'noopener' : null">
                  <span class="menu-icon"><i class="bi fs-3 bi-layers"></i></span>
                  <span class="menu-title fs-4 text-dark">{{ child.name }}</span>
                </a>
              </ng-template>
            </ng-template>
          </div>
        </div>
      </ng-container>
      <ng-template #simpleItem>
        <ng-container *ngIf="isRouterLink(item.url); else itemHref">
          <a class="menu-link menu-link-hover py-3" [routerLink]="item.url">
            <span class="menu-title fs-2 fw-bold text-dark">{{ item.name }}</span>
          </a>
        </ng-container>
        <ng-template #itemHref>
          <a class="menu-link menu-link-hover py-3" [href]="getSafeUrl(item.url)" [target]="isExternalLink(item.url) ? '_blank' : '_self'" [rel]="isExternalLink(item.url) ? 'noopener' : null">
            <span class="menu-title fs-2 fw-bold text-dark">{{ item.name }}</span>
          </a>
        </ng-template>
      </ng-template>
    </div>
  </ng-container>
</ng-container>

<div class="legacy-nav-empty" *ngIf="!menuItems.length && errorMessage">
  {{ errorMessage }}
</div>

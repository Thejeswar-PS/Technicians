<div class="container-fluid">
  <div class="responsive-wrapper">

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <div class="loading-content">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <span class="loading-text">Loading equipment details...</span>
      </div>
    </div>

    <!-- Error / Success Alerts -->
    <div *ngIf="errorMessage && !loading" class="alert alert-danger modern-alert" role="alert">
      <i class="fas fa-exclamation-triangle me-2"></i>
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage && !loading" class="alert alert-success modern-alert" role="alert">
      <i class="fas fa-check-circle me-2"></i>
      {{ successMessage }}
    </div>

    <!-- Main Content -->
    <div *ngIf="!loading">

      <!-- Header: Back | Title | Save -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <button type="button" class="btn btn-primary" (click)="goBack()" [disabled]="saving">
          <i class="fas fa-arrow-left me-1"></i> Back
        </button>

        <div style="text-align:center; flex:1;">
          <h2 class="text-primary fw-bold">
            <i class="fas fa-tools me-2"></i>
            Other Equipment
          </h2>
          <div class="text-muted" *ngIf="equipNo">
            Job: {{ callNbr }} &nbsp;|&nbsp; Equip No: {{ equipNo }} &nbsp;|&nbsp; Equip ID: {{ equipId }}
          </div>
        </div>

        <button
          type="button"
          class="btn btn-primary"
          (click)="saveEquipment()"
          [disabled]="saving || !equipmentVerificationForm.valid">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-1" role="status"></span>
          <i *ngIf="!saving" class="fas fa-save me-1"></i>
          {{ saving ? 'Saving...' : 'Save Equipment' }}
        </button>
      </div>

      <!-- Form Card -->
      <div class="form-card mb-3">
      <form [formGroup]="equipmentVerificationForm" class="modern-form">

        <div class="form-grid">

                <!-- Make -->
                <div class="form-field">
                  <label class="form-label required">Make</label>
                  <select
                    class="form-select"
                    formControlName="manufacturer"
                    [class.is-invalid]="equipmentVerificationForm.get('manufacturer')?.invalid && equipmentVerificationForm.get('manufacturer')?.touched">
                    <option value="">Choose manufacturer...</option>
                    <option *ngFor="let mfg of manufacturers" [value]="mfg.value">{{ mfg.label }}</option>
                  </select>
                  <div class="invalid-feedback"
                    *ngIf="equipmentVerificationForm.get('manufacturer')?.invalid && equipmentVerificationForm.get('manufacturer')?.touched">
                    Make is required
                  </div>
                </div>

                <!-- Model No -->
                <div class="form-field">
                  <label class="form-label required">Model No</label>
                  <input type="text" class="form-control" formControlName="modelNo"
                    [class.is-invalid]="equipmentVerificationForm.get('modelNo')?.invalid && equipmentVerificationForm.get('modelNo')?.touched">
                  <div class="invalid-feedback"
                    *ngIf="equipmentVerificationForm.get('modelNo')?.invalid && equipmentVerificationForm.get('modelNo')?.touched">
                    Model No is required
                  </div>
                </div>

                <!-- Serial No -->
                <div class="form-field">
                  <label class="form-label required">Serial No</label>
                  <input type="text" class="form-control" formControlName="serialNo"
                    [class.is-invalid]="equipmentVerificationForm.get('serialNo')?.invalid && equipmentVerificationForm.get('serialNo')?.touched">
                  <div class="invalid-feedback"
                    *ngIf="equipmentVerificationForm.get('serialNo')?.invalid && equipmentVerificationForm.get('serialNo')?.touched">
                    Serial No is required
                  </div>
                </div>

                <!-- Location -->
                <div class="form-field">
                  <label class="form-label">Location</label>
                  <input type="text" class="form-control" formControlName="location">
                </div>

                <!-- Date Code -->
                <div class="form-field">
                  <label class="form-label">Date Code</label>
                  <input type="date" class="form-control" formControlName="dateCode">
                </div>

                <!-- Status -->
                <div class="form-field">
                  <label class="form-label required">Status</label>
                  <select class="form-select" formControlName="status"
                    [class.is-invalid]="equipmentVerificationForm.get('status')?.invalid && equipmentVerificationForm.get('status')?.touched">
                    <option *ngFor="let option of statusOptions" [value]="option.value">{{ option.label }}</option>
                  </select>
                  <div class="invalid-feedback"
                    *ngIf="equipmentVerificationForm.get('status')?.invalid && equipmentVerificationForm.get('status')?.touched">
                    Status is required
                  </div>
                </div>

        </div><!-- /form-grid -->

        <!-- Status Notes (full-width) -->
        <div class="form-field mt-3">
          <label class="form-label">Status Notes</label>
          <textarea class="form-control" formControlName="statusNotes" rows="3"></textarea>
          <small class="text-muted">Required if status is not Online</small>
        </div>

        <!-- Comments (full-width) -->
        <div class="form-field mt-3">
          <label class="form-label">Comments / Description</label>
          <textarea class="form-control" formControlName="comments" rows="4"></textarea>
        </div>

      </form>
      </div><!-- /form-card -->

    </div><!-- /main content -->
  </div><!-- /responsive-wrapper -->
</div>
